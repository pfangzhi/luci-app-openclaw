name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空则读取 VERSION 文件)'
        required: false
        type: string
        default: ''
      create_release:
        description: '是否创建 Release'
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          INPUT_VER="${{ github.event.inputs.version }}"
          if [ "${{ github.event_name }}" = "push" ] && [ -n "${GITHUB_REF_NAME}" ]; then
            VER="${GITHUB_REF_NAME#v}"
          elif [ -n "$INPUT_VER" ]; then
            VER="$INPUT_VER"
          elif [ -f VERSION ]; then
            VER="$(cat VERSION | tr -d '[:space:]')"
          else
            VER="$(date -u +%Y.%m.%d)"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER" >> "$GITHUB_OUTPUT"
          echo "Version: $VER"

      - name: Extract build versions from source
        id: build_versions
        run: |
          # 从 openclaw-env 中提取版本号 (唯一的版本真相源)
          # NODE_VERSION_V2 是当前推荐的 Node.js 版本
          NODE_VER=$(grep -oP 'NODE_VERSION_V2="\K[0-9.]+' root/usr/bin/openclaw-env)
          OC_VER=$(grep -oP 'OC_TESTED_VERSION="\K[0-9.]+' root/usr/bin/openclaw-env)
          echo "node_version=${NODE_VER}" >> "$GITHUB_OUTPUT"
          echo "oc_version=${OC_VER}" >> "$GITHUB_OUTPUT"
          echo "Node.js: v${NODE_VER}"
          echo "OpenClaw: v${OC_VER}"

      - name: Inject version
        run: |
          VER="${{ steps.version.outputs.version }}"
          echo "$VER" > VERSION
          # 同步到 Makefile
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VER/" Makefile

      - name: Build .run installer (online)
        run: |
          chmod +x scripts/build_run.sh
          sh scripts/build_run.sh dist

      - name: Build .ipk package
        run: |
          chmod +x scripts/build_ipk.sh
          sh scripts/build_ipk.sh dist

      - name: Set up QEMU for ARM64 Node.js
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Build ARM64 musl Node.js
        run: |
          NODE_VER="${{ steps.build_versions.outputs.node_version }}"
          mkdir -p dist
          echo "=== Building Node.js v${NODE_VER} ARM64 musl (apk lts mode) ==="
          docker run --rm --platform linux/arm64 \
            -v "$PWD/dist:/output" \
            -v "$PWD/scripts/build-node-musl.sh:/build-node-musl.sh:ro" \
            -e "NODE_VER=${NODE_VER}" \
            -e "BUILD_MODE=apk" \
            -e "PKG_TYPE=lts" \
            alpine:3.21 sh /build-node-musl.sh

      - name: List outputs
        run: |
          echo "=== Build artifacts ==="
          ls -lh dist/
          echo ""
          echo "=== SHA256 checksums ==="
          sha256sum dist/*.run dist/*.ipk dist/*.tar.xz 2>/dev/null || true

      - name: Extract changelog
        id: changelog
        run: |
          VER="${{ steps.version.outputs.version }}"
          CHANGELOG=$(awk "/^## \\[${VER}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="暂无更新日志"
          fi
          {
            echo "content<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-openclaw-${{ steps.version.outputs.version }}
          path: |
            dist/*.run
            dist/*.ipk
            dist/*.tar.xz
          retention-days: 30
          compression-level: 0

      - name: Create Release
        if: github.event_name == 'push' || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          files: |
            dist/*.run
            dist/*.ipk
            dist/*.tar.xz
          draft: false
          prerelease: false
          body: |
            ${{ steps.changelog.outputs.content }}

            ---

            **在线安装** (需联网，自动下载 Node.js + OpenClaw)
            ```
            # iStoreOS
            sh luci-app-openclaw_${{ steps.version.outputs.version }}.run

            # OpenWrt
            opkg install luci-app-openclaw_${{ steps.version.outputs.version }}-1_all.ipk
            ```

            [使用文档](https://github.com/10000ge10000/luci-app-openclaw#readme) · [问题反馈](https://github.com/10000ge10000/luci-app-openclaw/issues) · [B站](https://space.bilibili.com/59438380) · [博客](https://blog.910501.xyz/)
